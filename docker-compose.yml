version: '3.8'

services:
  # The FastAPI Application
  api:
    build: .
    container_name: warehouse_api
    ports:
      - "8000:8000"
    environment:
      # Point this directly to your Supabase URL!
      - DATABASE_URL=postgresql://postgres.wdcfyhsnjbcidpzhlvno:QWER-1234asdfg@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your_super_secret_jwt_key
    depends_on:
      - redis
    volumes:
      - .:/app # Mounts the code for hot-reloading during development

  # The Redis Cache (Keep this, as your app.cache likely needs it)
  redis:
    image: redis:7-alpine
    container_name: warehouse_cache
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

# Define persistent volume for cache
volumes:
  redis_data:
