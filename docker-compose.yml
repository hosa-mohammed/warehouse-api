version: '3.8'

services:
  api:
    build: .
    container_name: warehouse_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: warehouse_cache
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data


volumes:
  redis_data:
